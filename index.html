<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- TailwindCSS & DaisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- default css -->
    <link rel="stylesheet" href="./styles/style.css" />

    <title>Green Tree Earth</title>
  </head>
  <body>
    <!-- header section start -->
    <header class="bg-[#15803D]">
      <div class="navbar container mx-auto">
        <div class="navbar-start">
          <div class="dropdown mr-5 lg:mr-0">
            <div
              tabindex="0"
              role="button"
              class="btn bg-green-600 border-0 shadow-none rounded-full lg:hidden"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M4 6h16M4 12h8m-8 6h16"
                />
              </svg>
            </div>
            <ul
              tabindex="-1"
              class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
            >
              <li><a class="font-medium" href="">About</a></li>
              <li>
                <a class="font-medium" href="">Gallery</a>
              </li>
              <li>
                <a class="font-medium" href="">Plant a Tree</a>
              </li>
            </ul>
          </div>
          <a class="text-xl text-white">Green Earth</a>
        </div>
        <div class="navbar-center hidden lg:flex">
          <ul class="menu menu-horizontal px-1">
            <li><a class="text-white font-medium" href="">About</a></li>
            <li>
              <a class="text-white font-medium" href="">Gallery</a>
            </li>
            <li>
              <a class="text-white font-medium" href="">Plant a Tree</a>
            </li>
          </ul>
        </div>
        <div class="navbar-end">
          <a
            class="btn bg-[#FACC15] text-white rounded-full px-10 border-0 shadow-none"
            >Plant a Tree</a
          >
        </div>
      </div>
    </header>
    <!-- header section end -->
    <main>
      <!-- banner section start -->
      <section class="bg-[#CFF0DC] flex justify-between items-center">
        <div class="left-img hidden lg:block">
          <img src="./assets/hero-leaf1.png" alt="" />
        </div>
        <div class="section-content text-center mx-auto space-y-5 p-5 lg:p-0">
          <h2 class="text-4xl font-bold">Plant a Tree, Grow a Future</h2>
          <p class="text-sm text-slate-600">
            Join our mission to plant 1 million trees and make the Earth greener
            for future generations.
          </p>
          <button class="btn bg-[#FACC15] rounded-full text-green-800">
            Get Involved
          </button>
        </div>
        <div class="right-img hidden lg:block">
          <img src="./assets/hero-leaf2.png" alt="" />
        </div>
      </section>
      <!-- banner section end -->

      <!-- trees section start -->
      <section class="container mx-auto py-20">
        <h2 class="text-4xl text-slate-900 font-semibold text-center mb-10">
          Choose Your Trees
        </h2>
        <div class="card-sections grid grid-cols-12 gap-3">
          <!-- display category button start -->
          <div class="categories col-span-2">
            <h2 class="font-semibold text-xl mb-2">Categories</h2>
            <div class="mb-2">
              <button class="btn bg-[#15803D] text-white border-0 w-full">
                All Trees
              </button>
            </div>
            <div id="categories-container" class="space-y-2"></div>
          </div>
          <!-- display category button end -->

          <!-- display trees cards start -->
          <div class="card-trees col-span-8">
            <div
              id="trees-container"
              class="grid grid-cols-1 lg:grid-cols-3 gap-3"
            ></div>
          </div>
          <!-- display trees cards end -->
          <div class="carts bg-rose-600 col-span-2">helloMe</div>
        </div>
      </section>
      <!-- trees section end -->
    </main>

    <script src="./script/index.js"></script>
  </body>
</html>
